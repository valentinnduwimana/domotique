<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commande vocale - Maison Connectée</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            
            /* Couleurs des états */
            --lamp-off: #475569;
            --lamp-on: #fbbf24;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            color: var(--text-main);
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 2.5rem;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            text-align: center;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-top: 0;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }

        .lamps-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 2rem;
        }

        .lamp-card {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 1.5rem;
            transition: all 0.3s ease;
        }

        .lamp-icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
            display: inline-block;
            color: var(--lamp-off);
            filter: drop-shadow(0 0 0px transparent);
            transition: all 0.4s ease;
        }

        .lamp-name {
            font-weight: 600;
            font-size: 1.2rem;
            margin-bottom: 4px;
        }

        /* --- ÉTATS DYNAMIQUES (Gérés en JS) --- */
        .lamp-card.is-on {
            border-color: rgba(251, 191, 36, 0.3);
            background: rgba(251, 191, 36, 0.05);
        }

        .lamp-card.is-on .lamp-icon {
            color: var(--lamp-on);
            filter: drop-shadow(0 0 12px rgba(251, 191, 36, 0.6));
            transform: scale(1.05);
        }

        .btn-container {
            position: relative;
            display: inline-block;
            margin: 1.5rem 0;
        }

        button {
            background: linear-gradient(135deg, #38bdf8, #2563eb);
            color: white;
            border: none;
            padding: 1rem 2.5rem;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(37, 99, 235, 0.4);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 0 auto;
        }

        button:hover:not(:disabled) {
            transform: scale(1.03);
            box-shadow: 0 6px 20px rgba(56, 189, 248, 0.6);
        }

        button:disabled {
            background: #475569;
            box-shadow: none;
            cursor: not-allowed;
            opacity: 0.6;
        }

        /* Mode Écoute active */
        .listening button {
            animation: pulse 1.5s infinite;
            background: linear-gradient(135deg, #b044ef, #1f1cb9);
            box-shadow: 0 4px 14px rgba(239, 68, 68, 0.4);
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.04); box-shadow: 0 6px 24px rgba(148, 68, 239, 0.7); }
            100% { transform: scale(1); }
        }

        .status {
            background: rgba(15, 23, 42, 0.8);
            border-radius: 12px;
            padding: 1rem;
            font-size: 0.95rem;
            min-height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: #cbd5e1;
        }
    </style>
    <!-- Utilisation de FontAwesome pour avoir de vraies icônes d'ampoules stylisées (SVG) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="card" id="mainCard">
    <h1>Contrôle Vocal domotique</h1>
    <p class="subtitle">Dites simplement ce que vous voulez allumer</p>
    
    <div class="lamps-container">
        <!-- Carte Salon -->
        <div class="lamp-card" id="card-salon">
            <div class="lamp-icon"><i class="fa-solid fa-lightbulb"></i></div>
            <div class="lamp-name">Salon</div>
        </div>
        <!-- Carte Chambre -->
        <div class="lamp-card" id="card-chambre">
            <div class="lamp-icon"><i class="fa-solid fa-bed"></i></div>
            <div class="lamp-name">Chambre</div>
        </div>
    </div>

    <div class="btn-container">
        <button id="startBtn">
            <span id="btnIcon">🎙️</span> <span id="btnText">appuiyer</span>
        </button>
    </div>

    <div class="status" id="statusMsg">Prêt. Cliquez pour parler.</div>
</div>

<script>
    const startBtn = document.getElementById('startBtn');
    const statusDiv = document.getElementById('statusMsg');
    const mainCard = document.getElementById('mainCard');
    const btnIcon = document.getElementById('btnIcon');
    const btnText = document.getElementById('btnText');

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
        statusDiv.innerHTML = "❌ Navigateur non supporté. Utilisez Google Chrome.";
        startBtn.disabled = true;
    } else {
        const recognition = new SpeechRecognition();
        recognition.lang = 'fr-FR';
        recognition.interimResults = false;

        startBtn.onclick = () => {
            statusDiv.innerHTML = "🎙️ Écoute en cours... Parlez maintenant.";
            mainCard.classList.add('listening');
            btnIcon.innerText = "🛑";
            btnText.innerText = "Écoute...";
            recognition.start();
        };

        const resetBtnState = () => {
            mainCard.classList.remove('listening');
            btnIcon.innerText = "🎙️";
            btnText.innerText = "Lancer l'écoute";
        };

        recognition.onresult = async (event) => {
            resetBtnState();
            const texte = event.results[0][0].transcript.toLowerCase();
            statusDiv.innerHTML = `📝 Reconnu : <strong>"${texte}"</strong>`;

            let lamp = null;
            let action = null;

            if (texte.includes("salon")) lamp = "salon";
            else if (texte.includes("chambre")) lamp = "chambre";
            else {
                statusDiv.innerHTML = "⚠️ Précisez le lieu : 'salon' ou 'chambre'";
                return;
            }

            if (texte.includes("allume")) action = "on";
            else if (texte.includes("éteins")) action = "off";
            else {
                statusDiv.innerHTML = "⚠️ Précisez l'action : 'allume' ou 'éteins'";
                return;
            }

            statusDiv.innerHTML = `⏳ Envoi de la commande... (${lamp} ➔ ${action})`;
            
            try {
                const response = await fetch(`/api/led/?lamp=${lamp}&action=${action}`);
                const data = await response.json();
                
                if (response.ok) {
                    statusDiv.innerHTML = `✅ ${data.message}`;
                    
                    // --- MISE À JOUR DE L'ÉTAT VISUEL EN CAS DE SUCCÈS ---
                    const targetCard = document.getElementById(`card-${lamp}`);
                    if (action === "on") {
                        targetCard.classList.add('is-on');
                    } else {
                        targetCard.classList.remove('is-on');
                    }
                    
                } else {
                    statusDiv.innerHTML = `❌ ${data.erreur}`;
                }
            } catch (err) {
                statusDiv.innerHTML = "❌ Erreur de connexion avec le serveur";
            }
        };

        recognition.onerror = (event) => {
            resetBtnState();
            statusDiv.innerHTML = `❌ Erreur micro : ${event.error}`;
        };

        recognition.onend = () => {
            resetBtnState();
        };
    }
</script>
</body>
</html>
